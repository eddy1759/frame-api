      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ecfccb" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ecfccb" stop-opacity="0.25"/>
