  <rect x="140" y="260" width="800" height="1400" rx="36" fill="none" stroke="#ecfccb" stroke-opacity="0.75" stroke-width="12"/>

  <rect x="48" y="300" width="52" height="1320" rx="18" fill="#16a34a" opacity="0.42"/>
  <rect x="980" y="300" width="52" height="1320" rx="18" fill="#16a34a" opacity="0.42"/>

  <g opacity="0.96">
    <path d="M188 1702 C230 1624, 284 1622, 336 1702" fill="none" stroke="#bbf7d0" stroke-width="10"/>
    <path d="M744 1702 C796 1622, 850 1624, 892 1702" fill="none" stroke="#bbf7d0" stroke-width="10"/>
    <ellipse cx="252" cy="132" rx="34" ry="20" fill="#86efac" transform="rotate(-28 252 132)"/>
