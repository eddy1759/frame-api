  <rect x="980" y="300" width="52" height="1320" rx="18" fill="#2563eb" opacity="0.42"/>

  <g opacity="0.96">
    <polygon points="540,74 700,144 540,214 380,144" fill="#93c5fd" opacity="0.7"/>
    <rect x="518" y="214" width="44" height="30" rx="8" fill="#93c5fd"/>
    <path d="M250 1738 C330 1684, 410 1684, 490 1738" fill="none" stroke="#bfdbfe" stroke-width="10"/>
